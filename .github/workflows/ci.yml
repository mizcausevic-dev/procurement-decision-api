name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Typecheck (mypy)
        run: mypy src

      - name: Tests
        run: pytest -q

  docker:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t procurement-decision-api:ci .
      - name: Smoke test container
        run: |
          docker run -d --name pda -p 8088:8088 procurement-decision-api:ci
          # Wait up to 30s for the service to come up.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8088/healthz > /dev/null; then
              echo "service is up"
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8088/healthz
          curl -fsS http://127.0.0.1:8088/ | head -c 200
          docker logs pda | tail -20
          docker stop pda
